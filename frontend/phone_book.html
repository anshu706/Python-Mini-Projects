<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phone Book Interface</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-phone" data-page="phone">
    <div class="container">
      <nav class="navbar reveal">
        <a class="brand" href="index.html"
          ><span class="logo-dot"></span><strong>Phone Book UI</strong></a
        >
        <div class="nav-links">
          <a href="index.html">Home</a><a href="quiz_game.html">Next: Quiz</a>
        </div>
      </nav>

      <section class="hero">
        <article class="panel reveal">
          <span class="badge">Mapped from phone_book.c</span>
          <h1>Contact Vault</h1>
          <p>Add and preview contacts in an elegant pane-based interface.</p>
        </article>
        <aside class="panel reveal">
          <h2>Data Fields</h2>
          <p>
            Name, age, phone, DOB, and address follow the same shape as your C
            model.
          </p>
        </aside>
      </section>

      <section class="two-col">
        <article class="panel reveal">
          <h2>Add Contact</h2>
          <div class="form-grid">
            <input id="pbName" type="text" placeholder="Name" />
            <input id="pbAge" type="number" min="0" placeholder="Age" />
            <input id="pbPhone" type="text" placeholder="Phone Number" />
            <input id="pbDob" type="text" placeholder="Date of Birth" />
            <textarea id="pbAddress" rows="3" placeholder="Address"></textarea>
            <button id="phoneAdd" type="button">Save Contact</button>
          </div>
        </article>
        <article class="panel reveal">
          <h2>Saved Contacts</h2>
          <div id="phoneResult" class="result-box">No contacts yet.</div>
        </article>
      </section>
    </div>
    <script src="app.js"></script>
  </body>
</html>
